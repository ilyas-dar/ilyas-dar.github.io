<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mohammad Ilyas Dar — Systems × AI Engineer</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --sys: #ffaa00;
  --sys-dim: #664400;
  --sys-glow: rgba(255,170,0,0.15);
  --ai: #00ccff;
  --ai-dim: #004455;
  --ai-glow: rgba(0,204,255,0.15);
  --fuse: #cc44ff;
  --fuse-glow: rgba(204,68,255,0.2);
  --bg: #020408;
  --bg2: #060c12;
  --bg3: #0a1520;
  --text: #c8d8e8;
  --text-dim: #445566;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  overflow-x:hidden;
  cursor:none;
}

/* Custom cursor */
#cursor{position:fixed;width:12px;height:12px;border:2px solid var(--fuse);border-radius:50%;pointer-events:none;z-index:9999;transition:transform .1s;mix-blend-mode:difference;}
#cursor-trail{position:fixed;width:30px;height:30px;border:1px solid rgba(204,68,255,0.3);border-radius:50%;pointer-events:none;z-index:9998;transition:all .15s;}

/* Scanlines overlay */
body::before{
  content:'';
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);
  pointer-events:none;z-index:1000;
}

/* SPLIT CANVAS */
#split-bg{
  position:fixed;top:0;left:0;width:100%;height:100%;
  pointer-events:none;z-index:0;
}

/* NAV */
nav{
  position:fixed;top:0;width:100%;z-index:500;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 32px;
  background:linear-gradient(180deg,rgba(2,4,8,.95) 0%,transparent 100%);
  border-bottom:1px solid rgba(255,170,0,.1);
}
.nav-logo{
  font-family:'Orbitron',sans-serif;
  font-size:.75rem;font-weight:900;letter-spacing:4px;
  color:var(--fuse);text-shadow:0 0 20px var(--fuse);
}
.nav-links{display:flex;gap:24px;}
.nav-links a{
  font-size:.65rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--text-dim);text-decoration:none;
  transition:color .2s;
}
.nav-links a:hover{color:var(--ai);}
.view-toggle{
  display:flex;gap:4px;
  background:rgba(255,255,255,.03);
  border:1px solid var(--text-dim);
  border-radius:4px;overflow:hidden;
}
.view-btn{
  padding:4px 12px;font-size:.6rem;letter-spacing:2px;
  border:none;background:transparent;color:var(--text-dim);
  cursor:none;transition:all .2s;font-family:'JetBrains Mono',monospace;
}
.view-btn.active{color:var(--bg);font-weight:600;}
.view-btn.sys.active{background:var(--sys);}
.view-btn.ai.active{background:var(--ai);}
.view-btn.unified.active{background:var(--fuse);}

/* STATUS BAR */
#status-bar{
  position:fixed;bottom:0;width:100%;z-index:500;
  display:flex;gap:24px;align-items:center;
  padding:6px 32px;
  background:rgba(2,4,8,.9);
  border-top:1px solid rgba(255,170,0,.08);
  font-size:.6rem;letter-spacing:1px;
}
.stat{display:flex;gap:6px;align-items:center;}
.stat-label{color:var(--text-dim);}
.stat-val{color:var(--sys);}
.stat-val.ai{color:var(--ai);}
.stat-val.fuse{color:var(--fuse);}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--sys);animation:blink 1.2s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* HERO */
#hero{
  position:relative;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:100px 32px 80px;z-index:10;
}
.hero-grid{
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:0;width:100%;max-width:1200px;align-items:center;
}

/* SYS PANEL */
.sys-panel{
  background:rgba(6,12,18,.8);
  border:1px solid rgba(255,170,0,.2);
  border-right:none;
  padding:28px;
  font-size:.7rem;line-height:1.8;
  animation:sys-flicker 8s infinite;
}
@keyframes sys-flicker{0%,100%{border-color:rgba(255,170,0,.2);}50%{border-color:rgba(255,170,0,.4);}}
.sys-header{
  color:var(--sys);font-size:.65rem;letter-spacing:3px;
  margin-bottom:16px;border-bottom:1px solid rgba(255,170,0,.2);
  padding-bottom:8px;
}
.mem-row{display:flex;gap:12px;margin:4px 0;font-size:.62rem;}
.mem-addr{color:var(--sys);opacity:.7;min-width:80px;}
.mem-hex{color:var(--text-dim);letter-spacing:2px;}
.mem-label{color:var(--sys);cursor:none;}
.mem-row:hover .mem-hex{color:var(--sys);}
.mem-row:hover .mem-addr{opacity:1;}
.proc-row{display:flex;gap:8px;font-size:.62rem;margin:3px 0;}
.pid{color:var(--sys);min-width:36px;}
.pname{color:var(--text);}
.pcpu{color:var(--sys);min-width:30px;text-align:right;}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;}
.reg{font-size:.6rem;}
.reg-name{color:var(--sys);opacity:.8;}
.reg-val{color:var(--text-dim);}

/* CENTER IDENTITY */
.hero-center{
  padding:0 32px;
  display:flex;flex-direction:column;align-items:center;
  position:relative;
}
.identity-ring{
  position:relative;width:180px;height:180px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:20px;
}
.ring{
  position:absolute;border-radius:50%;border:2px solid;
  animation:spin-ring linear infinite;
}
.ring-1{width:180px;height:180px;border-color:rgba(255,170,0,.3);animation-duration:20s;}
.ring-2{width:150px;height:150px;border-color:rgba(0,204,255,.3);animation-duration:15s;animation-direction:reverse;}
.ring-3{width:120px;height:120px;border-color:rgba(204,68,255,.3);animation-duration:10s;}
@keyframes spin-ring{to{transform:rotate(360deg);}}
.ring::before{
  content:'';position:absolute;top:-3px;left:50%;
  width:6px;height:6px;border-radius:50%;
  transform:translateX(-50%);
}
.ring-1::before{background:var(--sys);box-shadow:0 0 10px var(--sys);}
.ring-2::before{background:var(--ai);box-shadow:0 0 10px var(--ai);}
.ring-3::before{background:var(--fuse);box-shadow:0 0 10px var(--fuse);}
.hero-avatar{
  width:80px;height:80px;border-radius:50%;
  background:linear-gradient(135deg,var(--sys-dim),var(--ai-dim));
  display:flex;align-items:center;justify-content:center;
  font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;
  color:var(--fuse);text-shadow:0 0 20px var(--fuse);
  position:relative;z-index:2;
}
.hero-name{
  font-family:'Orbitron',sans-serif;
  font-size:1.1rem;font-weight:900;letter-spacing:3px;
  text-align:center;
  background:linear-gradient(90deg,var(--sys),var(--fuse),var(--ai));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:6px;
}
.hero-title{
  font-size:.62rem;letter-spacing:4px;color:var(--text-dim);
  text-align:center;margin-bottom:16px;
}
.hero-badges{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:16px;}
.badge{
  padding:3px 10px;font-size:.55rem;letter-spacing:2px;
  border-radius:2px;
}
.badge.sys{border:1px solid rgba(255,170,0,.4);color:var(--sys);}
.badge.ai{border:1px solid rgba(0,204,255,.4);color:var(--ai);}
.badge.fuse{border:1px solid rgba(204,68,255,.4);color:var(--fuse);}
.contact-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.contact-btn{
  padding:5px 14px;font-size:.58rem;letter-spacing:2px;
  border:1px solid var(--text-dim);color:var(--text-dim);
  background:transparent;cursor:none;
  font-family:'JetBrains Mono',monospace;
  text-decoration:none;
  transition:all .2s;
}
.contact-btn:hover{border-color:var(--fuse);color:var(--fuse);background:rgba(204,68,255,.05);}

/* AI PANEL */
.ai-panel{
  background:rgba(6,12,18,.8);
  border:1px solid rgba(0,204,255,.2);
  border-left:none;
  padding:28px;
  font-size:.7rem;line-height:1.8;
  animation:ai-pulse 6s infinite;
}
@keyframes ai-pulse{0%,100%{border-color:rgba(0,204,255,.2);}50%{border-color:rgba(0,204,255,.4);}}
.ai-header{
  color:var(--ai);font-size:.65rem;letter-spacing:3px;
  margin-bottom:16px;border-bottom:1px solid rgba(0,204,255,.2);
  padding-bottom:8px;
}
canvas#nn-canvas{
  display:block;width:100%;max-height:120px;
}
.model-row{display:flex;justify-content:space-between;font-size:.62rem;margin:4px 0;}
.layer-name{color:var(--ai);opacity:.8;}
.layer-info{color:var(--text-dim);}
.train-epoch{font-size:.62rem;margin:3px 0;}
.epoch-num{color:var(--ai);}
.epoch-text{color:var(--text-dim);}
.progress-wrap{display:flex;align-items:center;gap:8px;margin:6px 0;}
.progress-label{color:var(--text-dim);font-size:.6rem;min-width:80px;}
.progress-bar{flex:1;height:4px;background:rgba(0,204,255,.1);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--ai-dim),var(--ai));border-radius:2px;transition:width 1s;}
.progress-val{color:var(--ai);font-size:.6rem;min-width:32px;text-align:right;}

/* SECTION WRAPPER */
.section{
  position:relative;z-index:10;
  padding:80px 32px;
  max-width:1200px;margin:0 auto;
}
.sec-header{
  display:flex;align-items:center;gap:16px;
  margin-bottom:40px;
}
.sec-tag{
  font-family:'Orbitron',sans-serif;
  font-size:.6rem;letter-spacing:4px;
}
.sec-tag.sys{color:var(--sys);}
.sec-tag.ai{color:var(--ai);}
.sec-tag.fuse{color:var(--fuse);}
.sec-line{flex:1;height:1px;}
.sec-line.sys{background:linear-gradient(90deg,rgba(255,170,0,.4),transparent);}
.sec-line.ai{background:linear-gradient(90deg,rgba(0,204,255,.4),transparent);}
.sec-line.fuse{background:linear-gradient(90deg,rgba(204,68,255,.4),transparent);}
.sec-num{color:var(--text-dim);font-size:.6rem;}

/* SKILLS - HEX DUMP */
.skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.skill-bank{
  border:1px solid;padding:20px;
  font-size:.65rem;
}
.skill-bank.sys{border-color:rgba(255,170,0,.2);background:rgba(255,170,0,.02);}
.skill-bank.ai{border-color:rgba(0,204,255,.2);background:rgba(0,204,255,.02);}
.sb-title{
  font-size:.6rem;letter-spacing:3px;margin-bottom:16px;
  display:flex;align-items:center;gap:8px;
}
.sb-title.sys{color:var(--sys);}
.sb-title.ai{color:var(--ai);}
.hex-dump{font-family:'Share Tech Mono',monospace;}
.hex-line{display:flex;gap:10px;margin:3px 0;cursor:none;}
.hex-off{color:var(--sys);opacity:.5;font-size:.6rem;min-width:50px;}
.hex-bytes{color:var(--sys-dim);font-size:.6rem;letter-spacing:1px;min-width:140px;}
.hex-ascii{color:var(--text-dim);font-size:.6rem;}
.hex-line:hover .hex-bytes{color:var(--sys);}
.hex-line:hover .hex-ascii{color:var(--text);}
.matrix-wrap{font-family:'Share Tech Mono',monospace;font-size:.58rem;}
.mat-row{display:flex;gap:6px;margin:2px 0;}
.mat-val{color:var(--ai-dim);min-width:40px;text-align:right;}
.mat-val.hot{color:var(--ai);}
.mat-val.mid{color:rgba(0,204,255,.5);}
.skill-tag{
  display:inline-block;margin:3px;
  padding:3px 8px;font-size:.58rem;letter-spacing:1px;
  border:1px solid;border-radius:2px;cursor:none;
  transition:all .2s;
}
.skill-tag.sys{border-color:rgba(255,170,0,.3);color:var(--sys);}
.skill-tag.sys:hover{background:rgba(255,170,0,.1);box-shadow:0 0 12px rgba(255,170,0,.2);}
.skill-tag.ai{border-color:rgba(0,204,255,.3);color:var(--ai);}
.skill-tag.ai:hover{background:rgba(0,204,255,.1);box-shadow:0 0 12px rgba(0,204,255,.2);}
.skill-tag.fuse{border-color:rgba(204,68,255,.3);color:var(--fuse);}
.skill-tag.fuse:hover{background:rgba(204,68,255,.1);}

/* PROJECTS */
.projects-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.project-card{
  border:1px solid;padding:20px;
  cursor:none;transition:all .25s;
  position:relative;overflow:hidden;
}
.project-card::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:1px;
  transition:left .4s;
}
.project-card.ai-proj{border-color:rgba(0,204,255,.2);background:rgba(0,204,255,.01);}
.project-card.ai-proj::before{background:linear-gradient(90deg,transparent,var(--ai),transparent);}
.project-card.sys-proj{border-color:rgba(255,170,0,.2);background:rgba(255,170,0,.01);}
.project-card.sys-proj::before{background:linear-gradient(90deg,transparent,var(--sys),transparent);}
.project-card:hover::before{left:100%;}
.project-card.ai-proj:hover{border-color:rgba(0,204,255,.5);box-shadow:0 0 30px rgba(0,204,255,.08);}
.project-card.sys-proj:hover{border-color:rgba(255,170,0,.5);box-shadow:0 0 30px rgba(255,170,0,.08);}
.proj-type{font-size:.55rem;letter-spacing:3px;margin-bottom:8px;}
.proj-type.ai{color:var(--ai);}
.proj-type.sys{color:var(--sys);}
.proj-name{
  font-family:'Orbitron',sans-serif;font-size:.78rem;font-weight:700;
  margin-bottom:8px;letter-spacing:1px;
}
.proj-name.ai{color:var(--ai);}
.proj-name.sys{color:var(--sys);}
.proj-date{font-size:.58rem;color:var(--text-dim);margin-bottom:10px;}
.proj-desc{font-size:.63rem;color:var(--text-dim);line-height:1.8;margin-bottom:12px;}
.proj-stack{display:flex;flex-wrap:wrap;gap:4px;}
.stack-tag{
  font-size:.55rem;padding:2px 6px;border-radius:1px;
  border:1px solid rgba(255,255,255,.08);color:var(--text-dim);
}
.proj-metrics{
  margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,.05);
  display:flex;gap:16px;
}
.metric{font-size:.58rem;}
.metric-key{color:var(--text-dim);}
.metric-val{color:var(--fuse);}
.proj-arch{
  font-family:'Share Tech Mono',monospace;font-size:.58rem;
  color:var(--text-dim);margin-top:10px;padding:8px;
  background:rgba(0,0,0,.3);border-left:2px solid;
}
.proj-arch.ai{border-color:var(--ai);}
.proj-arch.sys{border-color:var(--sys);}

/* EXPERIENCE / TIMELINE */
.timeline{position:relative;padding-left:32px;}
.timeline::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:1px;
  background:linear-gradient(180deg,var(--sys),var(--fuse),var(--ai));
}
.tl-item{position:relative;margin-bottom:32px;}
.tl-dot{
  position:absolute;left:-36px;top:6px;
  width:9px;height:9px;border-radius:50%;
  border:1px solid var(--fuse);background:var(--bg);
}
.tl-dot::after{
  content:'';position:absolute;inset:-4px;border-radius:50%;
  border:1px solid rgba(204,68,255,.3);
  animation:pulse-dot 2s infinite;
}
@keyframes pulse-dot{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.5);opacity:0;}}
.tl-timestamp{font-size:.6rem;color:var(--sys);letter-spacing:2px;margin-bottom:4px;}
.tl-kernel-msg{
  font-family:'Share Tech Mono',monospace;font-size:.63rem;
  color:var(--text-dim);
}
.tl-kernel-msg .ts{color:var(--sys);opacity:.7;}
.tl-kernel-msg .level{color:var(--fuse);}
.tl-kernel-msg .msg{color:var(--text);}
.tl-detail{font-size:.62rem;color:var(--text-dim);margin-top:6px;line-height:1.8;padding-left:12px;border-left:1px solid rgba(255,255,255,.06);}

/* CERTIFICATES */
.certs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}
.cert-card{
  padding:16px;border:1px solid rgba(255,170,0,.15);
  background:rgba(255,170,0,.01);
  font-size:.63rem;transition:all .2s;
}
.cert-card:hover{border-color:rgba(255,170,0,.4);background:rgba(255,170,0,.03);}
.cert-name{color:var(--sys);margin-bottom:4px;letter-spacing:1px;}
.cert-issuer{color:var(--text-dim);font-size:.58rem;}
.cert-date{color:var(--text-dim);font-size:.55rem;margin-top:4px;opacity:.6;}

/* EDUCATION */
.edu-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.edu-card{
  border:1px solid rgba(204,68,255,.2);
  background:rgba(204,68,255,.01);
  padding:20px;
}
.edu-school{color:var(--fuse);font-size:.75rem;font-family:'Orbitron',sans-serif;font-weight:700;letter-spacing:1px;margin-bottom:6px;}
.edu-degree{color:var(--text);font-size:.65rem;margin-bottom:4px;}
.edu-period{color:var(--text-dim);font-size:.58rem;margin-bottom:4px;}
.edu-grade{color:var(--fuse);font-size:.62rem;}

/* ACHIEVEMENTS */
.achieve-list{display:flex;flex-direction:column;gap:12px;}
.achieve-item{
  display:flex;gap:16px;align-items:flex-start;
  padding:14px;border:1px solid rgba(204,68,255,.1);
  background:rgba(204,68,255,.01);
  font-size:.63rem;
}
.achieve-icon{color:var(--fuse);font-size:1rem;line-height:1;}
.achieve-text{color:var(--text-dim);line-height:1.8;}
.achieve-text strong{color:var(--text);}

/* TERMINAL */
#terminal-section{
  position:relative;z-index:10;
  padding:60px 32px;max-width:1200px;margin:0 auto;
}
.terminal-window{
  border:1px solid rgba(255,170,0,.3);
  background:rgba(6,12,18,.95);
  border-radius:4px;overflow:hidden;
}
.term-titlebar{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;background:rgba(255,170,0,.06);
  border-bottom:1px solid rgba(255,170,0,.15);
}
.term-dot{width:10px;height:10px;border-radius:50%;}
.term-dot.r{background:#ff5f57;}
.term-dot.y{background:#ffbd2e;}
.term-dot.g{background:#28c840;}
.term-title{font-size:.62rem;color:var(--text-dim);letter-spacing:2px;margin-left:8px;}
.term-body{
  padding:20px;font-family:'Share Tech Mono',monospace;
  font-size:.68rem;line-height:1.8;
  min-height:200px;max-height:420px;overflow-y:auto;
}
.term-body::-webkit-scrollbar{width:4px;}
.term-body::-webkit-scrollbar-track{background:transparent;}
.term-body::-webkit-scrollbar-thumb{background:var(--sys-dim);}
.term-line{margin:2px 0;}
.term-prompt{color:var(--sys);}
.term-cmd{color:var(--text);}
.term-out{color:var(--text-dim);}
.term-out.sys{color:var(--sys);}
.term-out.ai{color:var(--ai);}
.term-out.fuse{color:var(--fuse);}
.term-out.err{color:#ff4444;}
.term-input-row{display:flex;align-items:center;gap:6px;margin-top:8px;}
.term-input-prompt{color:var(--sys);}
#term-input{
  background:transparent;border:none;outline:none;
  color:var(--text);font-family:'Share Tech Mono',monospace;
  font-size:.68rem;flex:1;
  caret-color:var(--sys);
}

/* MODAL */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.85);
  z-index:2000;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
#modal-overlay.show{display:flex;}
.modal-box{
  max-width:700px;width:90%;max-height:85vh;overflow-y:auto;
  border:1px solid var(--fuse);
  background:var(--bg2);padding:32px;
  position:relative;
}
.modal-box::-webkit-scrollbar{width:4px;}
.modal-box::-webkit-scrollbar-thumb{background:var(--fuse-glow);}
.modal-close{
  position:absolute;top:16px;right:16px;
  background:none;border:none;color:var(--text-dim);
  font-size:1.2rem;cursor:none;
}
.modal-close:hover{color:var(--fuse);}
.modal-title{
  font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;
  color:var(--fuse);margin-bottom:6px;
}
.modal-sub{font-size:.62rem;color:var(--text-dim);margin-bottom:20px;}
.modal-section{margin-bottom:20px;}
.modal-sec-title{
  font-size:.62rem;letter-spacing:3px;color:var(--ai);
  margin-bottom:8px;
}
.modal-body{font-size:.65rem;color:var(--text-dim);line-height:1.9;}
.code-block{
  background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);
  padding:12px;font-family:'Share Tech Mono',monospace;
  font-size:.62rem;color:var(--text-dim);margin:10px 0;
  overflow-x:auto;
}
.code-block .kw{color:var(--sys);}
.code-block .fn{color:var(--ai);}
.code-block .cm{color:var(--text-dim);opacity:.5;}
.code-block .str{color:var(--fuse);}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:12px;}
.m-box{
  padding:10px;border:1px solid rgba(255,255,255,.06);
  text-align:center;
}
.m-val{font-size:.9rem;font-family:'Orbitron',sans-serif;color:var(--fuse);}
.m-key{font-size:.55rem;color:var(--text-dim);margin-top:4px;}

/* KERNEL PANIC */
#kpanic{
  position:fixed;inset:0;background:#002200;
  z-index:9999;display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:16px;
  font-family:'Share Tech Mono',monospace;font-size:.75rem;
  color:#00ff00;padding:40px;
}
#kpanic.show{display:flex;}
.kp-title{font-size:1.2rem;font-weight:bold;color:#00ff00;letter-spacing:2px;}

/* EASTER EGG KONAMI */
#superuser-banner{
  position:fixed;top:80px;left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg,rgba(204,68,255,.9),rgba(0,204,255,.9));
  padding:12px 32px;font-size:.65rem;letter-spacing:2px;color:white;
  z-index:3000;display:none;border-radius:2px;
  text-align:center;
}
